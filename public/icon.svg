<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BFF"/>
      <stop offset="100%" style="stop-color:#4F8CF7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Coin outer ring -->
  <circle cx="256" cy="272" r="160" fill="#FFD54F" stroke="#FFC107" stroke-width="8"/>
  <!-- Coin inner ring -->
  <circle cx="256" cy="272" r="130" fill="none" stroke="#FFC107" stroke-width="4"/>
  <!-- Shekel symbol ₪ -->
  <text x="256" y="295" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#F57F17">₪</text>
  <!-- Star sparkle top-right -->
  <polygon points="400,100 408,120 428,128 408,136 400,156 392,136 372,128 392,120" fill="white" opacity="0.9"/>
  <!-- Star sparkle top-left -->
  <polygon points="130,80 135,93 148,98 135,103 130,116 125,103 112,98 125,93" fill="white" opacity="0.7"/>
</svg>
